# Free "keep-awake" ping so the Render free tier never sleeps → always instant.
# Runs on GitHub Actions, which is FREE and unlimited for public repos.
#
# It pings /health every 5 minutes. Render sleeps only after 15 min idle, so
# even if GitHub delays a run, the service stays awake with margin.
#
# NOTE: update the URL below if Render assigns a different one than predicted.
name: keep-awake

on:
  schedule:
    - cron: "*/5 * * * *"      # every 5 minutes
  workflow_dispatch: {}         # allows a manual test run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health to prevent free-tier sleep
        run: |
          URL="https://swiss-ephemeris-api-2m5g.onrender.com/health"
          # --max-time 90 gives a sleeping service time to wake on the first hit.
          curl -fsS --max-time 90 "$URL" \
            && echo "awake: $URL" \
            || echo "ping failed (service may be waking or not deployed yet)"
